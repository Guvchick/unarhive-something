services:

  # ── Локальный Telegram Bot API сервер ────────────────────────────────────
  # Снимает ограничение 50 МБ → до 2 ГБ на файл.
  # Требует TELEGRAM_API_ID и TELEGRAM_API_HASH из https://my.telegram.org/apps
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: unarchive_telegram_api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID:   ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL:    1          # локальный режим — файлы хранятся на диске
    volumes:
      - telegram-api-data:/var/lib/telegram-bot-api
    expose:
      - "8081"

  # ── Бот ──────────────────────────────────────────────────────────────────
  bot:
    build: .
    container_name: unarchive_bot
    restart: unless-stopped
    env_file: .env
    environment:
      LOCAL_API_URL: "http://telegram-bot-api:8081"
    depends_on:
      - telegram-bot-api
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      # Общий том — бот читает файлы прямо с диска API-сервера (is_local=True)
      - telegram-api-data:/var/lib/telegram-bot-api:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  telegram-api-data:
